
version: '3.8'

services:
  backend:
    build: ./backend
    command: npm run dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      - mongo

  frontend:
    image: node:18
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    working_dir: /app
    stdin_open: true
    depends_on:
      - backend

  mongo:
    image: mongo
    ports:
      - "27017:27017"
